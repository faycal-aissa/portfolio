<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Certifications - Fayçal AISSA</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .certif-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .certif-card {
            background: rgba(255, 255, 255, 0.05); /* Adapté à ton thème sombre */
            border: 1px solid #00aaff;
            border-radius: 10px;
            padding: 20px;
            width: 250px;
            text-align: center;
            transition: transform 0.3s;
        }
        .certif-card:hover {
            transform: translateY(-5px);
        }
        .certif-card img {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="intro-section">
            <h1>🎓 Mes Certifications Professionnelles</h1>
            <p>Afin de valider mes compétences techniques, j'ai obtenu plusieurs certifications reconnues par les leaders du marché de l'informatique et de la cybersécurité.</p>
        </section>

        <div class="certif-grid">
            <div class="certif-card">
                <img src="https://images.credly.com/images/83096058-f947-4148-8a8b-3f0449a88805/image.png" alt="Cisco Certified Support Technician (CCST) Cybersecurity">
                <h3>CCST Cybersecurity</h3>
                <p>Cisco</p>
                <a href="https://www.credly.com/users/ton-nom/badges/ton-id" target="_blank" class="btn">Vérifier le badge</a>
            </div>

            </div>
    </main>

    </body>
</html>
